<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linkblog</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>Linkblog</h1>

      <div id="status-section" class="section">
        <div id="current-url" class="url-display">Loading...</div>

        <label for="link-title">Title</label>
        <input
          type="text"
          id="link-title"
          placeholder="Page title (optional)"
        />

        <label for="link-summary">Summary</label>
        <textarea
          id="link-summary"
          placeholder="Add notes about this link (optional)"
          rows="3"
        ></textarea>

        <button id="save-btn" class="btn btn-primary">Save to Linkblog</button>
        <div id="status-message" class="status-message hidden"></div>
      </div>

      <hr />

      <div class="section">
        <h2>Settings</h2>
        <label for="api-key">API Key (x-api-key)</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="api-key"
            placeholder="Enter your API token"
          />
          <button
            type="button"
            id="toggle-api-key"
            class="toggle-password"
            aria-label="Toggle API key visibility"
          >
            <svg
              id="eye-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg
              id="eye-off-icon"
              class="hidden"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
              ></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>

        <label for="api-endpoint">API Endpoint</label>
        <input
          type="url"
          id="api-endpoint"
          placeholder="https://api.linkblog.in/links"
        />

        <button id="save-settings-btn" class="btn btn-secondary">
          Save Settings
        </button>
        <div id="settings-message" class="status-message hidden"></div>
      </div>
    </div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
